<!DOCTYPE html>
<html>

<head>
    <title>AI Fake Profile Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 450px;
            background: #0f172a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 25px cyan;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: cyan;
        }

        .upload-box {
            border: 2px dashed cyan;
            padding: 20px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        input {
            margin-top: 10px;
        }

        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 15px;
            display: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: cyan;
            color: black;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            background: #67e8f9;
        }

        .result {
            margin-top: 25px;
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #1e293b;
        }

        .fake {
            color: #ef4444; /* Red */
        }

        .suspicious {
            color: #f97316; /* Orange */
        }

        .real {
            color: #22c55e; /* Green */
        }

        .score-box {
            margin-top: 15px;
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
        }

        .score {
            margin-top: 5px;
            font-size: 15px;
        }

        .reason {
            margin-top: 15px;
            line-height: 1.6;
        }

        .ocr {
            margin-top: 20px;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 14px;
            border-left: 3px solid cyan;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AI Fake Profile Detector</h1>

        <div class="upload-box">
            <h3>Upload Profile Screenshot</h3>
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
        </div>

        <img id="preview">

        <button onclick="scanProfile()">
            Scan Profile
        </button>

        <div id="result"></div>
    </div>

    <script>
        function previewImage(event) {
            const preview = document.getElementById('preview');
            if (event.target.files.length > 0) {
                preview.src = URL.createObjectURL(event.target.files[0]);
                preview.style.display = 'block';
            }
        }

        async function scanProfile() {
            const fileInput = document.getElementById('imageInput');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput || fileInput.files.length === 0) {
                alert("Please select an image file first!");
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image', file);

            // స్కానింగ్ లోడింగ్ స్టేటస్
            resultDiv.innerHTML = '<h3 style="text-align:center; margin-top:20px; color:cyan;">Scanning Profile... Please wait...</h3>';

            try {
                const response = await fetch(
                    'https://ai-fake-profile-detector-production.up.railway.app/scan-profile',
                    {
                        method: 'POST',
                        body: formData
                    }
                );

                if (!response.ok) {
                    throw new Error(`Server Error: Status ${response.status}`);
                }

                const data = await response.json();

                // కరెక్ట్ క్లాస్ నేమ్ సెలెక్ట్ చేయడం
                let className = 'real';
                if (data.classification === 'FAKE PROFILE') {
                    className = 'fake';
                } else if (data.classification === 'SUSPICIOUS') {
                    className = 'suspicious';
                }

                // డైనమిక్ అవుట్‌పుట్ - అన్ని స్కోర్లను క్లియర్ గా చూపిస్తుంది
                resultDiv.innerHTML = `
                    <div class="result">
                        <h2 class="${className}" style="text-align: center; font-size: 24px;">
                            ${data.classification || 'UNKNOWN'}
                        </h2>
                        
                        <div class="score-box">
                            <h4 class="score" style="color: cyan;">Total Risk Score: ${data.risk_score !== undefined ? data.risk_score : 'N/A'}%</h4>
                            <p class="score" style="font-size:13px; color:#94a3b8;">• Metadata/Rule Score: ${data.rule_score !== undefined ? data.rule_score : '0'}%</p>
                            <p class="score" style="font-size:13px; color:#94a3b8;">• Deep Learning AI Score: ${data.ai_score !== undefined ? data.ai_score : '0'}%</p>
                        </div>

                        <div class="reason">
                            <h3 style="color: #cbd5e1; font-size: 16px; margin-bottom: 5px;">Detection Reasons:</h3>
                            <p style="font-size: 14px; color: #94a3b8;">
                                ${data.reasons && data.reasons.length > 0 ? data.reasons.join('<br>• ') : 'No suspicious patterns detected.'}
                            </p>
                        </div>

                        <div class="ocr">
                            <h3 style="color: cyan; font-size: 15px; margin-bottom: 5px;">Extracted Text (OCR):</h3>
                            <p style="color: #cbd5e1; font-style: italic;">"${data.extracted_text || 'No text found in screenshot.'}"</p>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error("Error during scan:", error);
                resultDiv.innerHTML = `
                    <div class="result" style="border: 1px solid #ef4444; background: #1e1b4b;">
                        <h3 style="color: #ef4444;">Failed to Connect</h3>
                        <p style="margin-top: 10px; font-size: 14px; color: #fca5a5;">${error.message}</p>
                        <p style="margin-top: 5px; font-size: 12px; color: #94a3b8;">Tip: Make sure Railway deployment is ACTIVE.</p>
                    </div>
                `;
            }
        }
    </script>

</body>
</html>
